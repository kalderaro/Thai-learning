<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תאילנדית לליאור - גרסת המאסטר הסופית</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system, sans-serif; background:linear-gradient(135deg,#1e3c72,#2a5298); min-height:100vh; padding:20px; color:#333; }
        .container { max-width:500px; margin:0 auto; }
        .header { background:white; border-radius:20px; padding:25px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.2); margin-bottom:20px; border-top:8px solid #f1c40f; }
        .screen { display:none; animation:fadeIn 0.3s; }
        .screen.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .card { background:white; border-radius:15px; padding:18px; margin-bottom:12px; cursor:pointer; display:flex; align-items:center; gap:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); transition:0.2s; }
        .card:active { transform:scale(0.98); }
        .btn { background:white; color:#1e3c72; border:none; padding:18px; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer; width:100%; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .btn-home { background:#34495e; color:white; }
        .quiz-option { background:#f8f9fa; border:3px solid #eee; border-radius:12px; padding:18px; font-size:20px; font-weight:600; cursor:pointer; text-align:center; margin-bottom:10px; transition:0.2s; }
        .correct { border-color:#27ae60; background:#d4edda; color:#155724; }
        .wrong { border-color:#e74c3c; background:#f8d7da; color:#721c24; }
        .flashcard { background:white; border-radius:20px; padding:60px 20px; min-height:300px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,0.15); margin-bottom:20px; }
        .word-thai { font-size:42px; color:#2980b9; font-weight:bold; }
        .word-hebrew { font-size:32px; margin-top:15px; font-weight:bold; }
        .word-pron { font-size:22px; color:#7f8c8d; margin-top:10px; font-style:italic; background:#f0f0f0; padding:5px 15px; border-radius:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🇹🇭 המילון של ליאור</h1>
        <p>סנכרון מלא 2026 - מוכן לטיול!</p>
    </div>

    <div id="mainMenu" class="screen active">
        <button class="btn" onclick="showScreen('learnMenu')">📚 לימוד קטגוריות</button>
        <button class="btn" onclick="startQuiz('all')" style="background:#f1c40f; color:#2c3e50;">🎯 מבחן רנדומלי (הכל)</button>
        <button class="btn" onclick="showScreen('statsScreen')" style="background:#bdc3c7;">📊 סטטיסטיקות</button>
    </div>

    <div id="learnMenu" class="screen">
        <button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור</button>
        <div id="learnCats"></div>
    </div>

    <div id="flashcardsScreen" class="screen">
        <button class="btn btn-home" onclick="showScreen('learnMenu')">🔙 חזור</button>
        <div id="flashcard" class="flashcard" onclick="toggleCard()">
            <div id="cardFront"><div class="word-thai" id="cardThai"></div><p style="color:#ccc; margin-top:20px;">לחץ להיפוך</p></div>
            <div id="cardBack" style="display:none;">
                <div class="word-hebrew" id="cardHebrew"></div>
                <div class="word-pron" id="cardPron"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="prevCard()" style="flex:1;">הקודם</button>
            <button class="btn" onclick="nextCard()" style="flex:1;">הבא</button>
        </div>
    </div>

    <div id="quiz" class="screen">
        <div id="quizProgress" style="text-align:center; color:white; margin-bottom:10px; font-weight:bold;"></div>
        <div class="header">
            <h2 id="qText" style="font-size:18px;">מה הפירוש?</h2>
            <h1 id="qWord" style="color:#2980b9"></h1>
        </div>
        <div id="quizOpts"></div>
        <button id="nextBtn" class="btn" style="display:none; background:#27ae60; color:white;" onclick="nextQ()">המשך ←</button>
    </div>

    <div id="statsScreen" class="screen">
        <button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור</button>
        <div id="statsContent" class="card" style="display:block; text-align:center;"></div>
    </div>
</div>

<script>
const vocab = {
    "basics": { name: "נימוסים וסלנג", icon: "💬", words: [
        { thai: "Sabai dee mai?", hebrew: "מה שלומך?", pron: "סַבַּאי דִי מַאי?" },
        { thai: "Jing Di?!", hebrew: "אשכרה?! / רציני?!", pron: "גִ'ינְג דִי?!" },
        { thai: "Jai Yen Yen", hebrew: "תירגע / קח באיזי", pron: "גַ'אי יֶן יֶן" },
        { thai: "Tham Rai?", hebrew: "מה אתה עושה?", pron: "תַ'אם רַאי?" },
        { thai: "Fan dee na", hebrew: "לילה טוב", pron: "פַאן דִי נָה" },
        { thai: "Kho thot", hebrew: "סליחה / מצטער", pron: "קוֹ-תוֹט" },
        { thai: "Yin dee", hebrew: "זה העונג שלי / בבקשה", pron: "יִין דִי" }
    ]},
    "noodles": { name: "נוסחת הנדל\"ס", icon: "🍜", words: [
        { thai: "Sen Lek", hebrew: "אטריות אורז דקות", pron: "סֶן לֶק" },
        { thai: "Sen Yai", hebrew: "אטריות אורז רחבות", pron: "סֶן יַאי" },
        { thai: "Ba-Mee", hebrew: "אטריות ביצים", pron: "בָּא-מִי" },
        { thai: "Nam", hebrew: "עם מרק (רטוב)", pron: "נָאם" },
        { thai: "Haeng", hebrew: "יבש (ללא מרק)", pron: "הֶנְג" },
        { thai: "Look Chin", hebrew: "כדורי בשר (תוספת)", pron: "לוּק צִ'ין" },
        { thai: "Tom Yam", hebrew: "מרק חריף", pron: "טוֹם יָאם" }
    ]},
    "food_drink": { name: "אוכל ומסעדה", icon: "🍽️", words: [
        { thai: "Check bin", hebrew: "חשבון בבקשה", pron: "צֶ'ק בִּין" },
        { thai: "Giep Tung", hebrew: "חשבון (סלנג מקומי)", pron: "גֶפ דָאנְג" },
        { thai: "Aroy maak", hebrew: "טעים מאוד", pron: "אָ-רוֹי מַאק" },
        { thai: "Phom Ao...", hebrew: "אני רוצה (להזמנה)", pron: "פּוֹם אָאוֹ" },
        { thai: "Mai Sai Prik", hebrew: "בלי לשים פלפל חריף", pron: "מַאי סַאי פְּרִיק" },
        { thai: "Hio Nam", hebrew: "צמא (רעב למים)", pron: "הִיוּ נָאם" },
        { thai: "Nam Plao", hebrew: "מים מינרליים", pron: "נָאם פְּלָאוּ" }
    ]},
    "pun_fruits": { name: "שייקים ופירות", icon: "🍹", words: [
        { thai: "Taeng-mo Pun", hebrew: "שייק אבטיח", pron: "טֶנְג-מוֹ פַּאן" },
        { thai: "Mamuang Pun", hebrew: "שייק מנגו", pron: "מָא-מוּאַנְג פַּאן" },
        { thai: "Som", hebrew: "תפוז", pron: "סוֹם" },
        { thai: "Som-o", hebrew: "פומלה", pron: "סוֹם-אוֹ" },
        { thai: "Farang", hebrew: "גויאבה (לא מתוק)", pron: "פָא-רָאנְג" },
        { thai: "Chompoo", hebrew: "תפוח מים", pron: "צוֹ'מְפּוּ" },
        { thai: "Khao Niao Mamuang", hebrew: "מנגו סטיקי רייס", pron: "קָאוּ נִי-אוֹ מָא-מוּאַנְג" }
    ]},
    "transport": { name: "תחבורה וזמן", icon: "🚕", words: [
        { thai: "Poet miter", hebrew: "תפעיל מונה", pron: "פֶּואֶט מִי-טֶר" },
        { thai: "Yut thee-nee", hebrew: "עצור כאן", pron: "יוּט טִי נִי" },
        { thai: "Klai-klai", hebrew: "קרוב / ליד", pron: "קְלַאי-קְלַאי" },
        { thai: "Glai", hebrew: "רחוק", pron: "גְלַאי (מתמשך)" },
        { thai: "Wan Ni", hebrew: "היום", pron: "וָאן נִי" },
        { thai: "Phrung Ni", hebrew: "מחר", pron: "פְּרוּנְג נִי" },
        { thai: "Eek gee na-thee?", hebrew: "כמה דקות עוד?", pron: "אִיק קִי נָא-תִי?" }
    ]},
    "health": { name: "בריאות ועזרה", icon: "🩺", words: [
        { thai: "Bao-wan", hebrew: "סוכרת", pron: "בָּאוֹ וָאן" },
        { thai: "Thy-roid", hebrew: "בלוטת התריס", pron: "תָּאי-רוֹי" },
        { thai: "Ya-nuan", hebrew: "משחה לשרירים", pron: "יָא-נוּאַן" },
        { thai: "Ya-mong", hebrew: "טייגר באם", pron: "יָא-מוֹנְג" },
        { thai: "Ya-tha-yung", hebrew: "עקיצות יתוש", pron: "יָא-תָא-יוּנְג" }
    ]}
};

let state = { currentCat: null, wordIndex: 0, questions: [], current: 0, score: 0, stats: JSON.parse(localStorage.getItem('thaiStats_Master_Lior') || '{"total":0,"correct":0}') };

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'statsScreen') renderStats();
}

function init() {
    const l = document.getElementById('learnCats'); l.innerHTML = '';
    for (let id in vocab) {
        l.innerHTML += `<div class="card" onclick="startLearn('${id}')"><span>${vocab[id].icon}</span> <strong>${vocab[id].name}</strong></div>`;
    }
}

function startLearn(id) { state.currentCat = id; state.wordIndex = 0; showCard(); showScreen('flashcardsScreen'); }

function showCard() {
    const w = vocab[state.currentCat].words[state.wordIndex];
    document.getElementById('cardThai').textContent = w.thai;
    document.getElementById('cardHebrew').textContent = w.hebrew;
    document.getElementById('cardPron').textContent = `הגייה: ${w.pron}`;
    document.getElementById('cardBack').style.display = 'none';
    document.getElementById('cardFront').style.display = 'block';
}

function toggleCard() {
    const f = document.getElementById('cardFront'), b = document.getElementById('cardBack');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
    b.style.display = b.style.display === 'none' ? 'block' : 'none';
}

function nextCard() { state.wordIndex = (state.wordIndex + 1) % vocab[state.currentCat].words.length; showCard(); }
function prevCard() { state.wordIndex = (state.wordIndex - 1 + vocab[state.currentCat].words.length) % vocab[state.currentCat].words.length; showCard(); }

function startQuiz(src) {
    let pool = []; Object.values(vocab).forEach(c => pool.push(...c.words));
    state.questions = pool.sort(() => 0.5 - Math.random()).slice(0, 10).map(w => {
        // בחירת תשובות לא נכונות רק מתוך המאגר הקיים
        let others = pool.map(x => x.hebrew).filter(h => h !== w.hebrew);
        let shuffledOthers = [...new Set(others)].sort(() => 0.5 - Math.random()).slice(0, 3);
        return { w: w, correct: w.hebrew, opts: [w.hebrew, ...shuffledOthers].sort(() => 0.5 - Math.random()) };
    });
    state.current = 0; state.score = 0; showQ(); showScreen('quiz');
}

function showQ() {
    const q = state.questions[state.current];
    document.getElementById('quizProgress').textContent = `שאלה ${state.current + 1} מתוך 10`;
    document.getElementById('qWord').textContent = q.w.thai;
    const o = document.getElementById('quizOpts'); o.innerHTML = '';
    q.opts.forEach(opt => {
        const d = document.createElement('div');
        d.className = 'quiz-option'; d.textContent = opt;
        d.onclick = () => {
            if(opt === q.correct) { d.classList.add('correct'); state.score++; state.stats.correct++; }
            else { d.classList.add('wrong'); Array.from(o.children).forEach(el => { if(el.textContent === q.correct) el.classList.add('correct'); }); }
            state.stats.total++; localStorage.setItem('thaiStats_Master_Lior', JSON.stringify(state.stats));
            Array.from(o.children).forEach(el => el.onclick = null);
            document.getElementById('nextBtn').style.display = 'block';
        };
        o.appendChild(d);
    });
    document.getElementById('nextBtn').style.display = 'none';
}

function nextQ() {
    state.current++; if(state.current < 10) showQ();
    else { alert(`כל הכבוד ליאור! סיימת.\nציון: ${state.score}/10`); showScreen('mainMenu'); }
}

function renderStats() {
    const s = state.stats; const p = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
    document.getElementById('statsContent').innerHTML = `<h3>הביצועים שלך:</h3><p>שאלות שענית: ${s.total}</p><p>דיוק: ${p}%</p>`;
}

init();
</script>
</body>
</html>
