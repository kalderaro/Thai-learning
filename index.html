<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לימוד תאילנדית 🇹🇭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 18px;
            color: #666;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card:active {
            transform: translateY(0);
        }

        .category-card {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-icon {
            font-size: 40px;
            flex-shrink: 0;
        }

        .category-info {
            flex: 1;
        }

        .category-name {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .category-count {
            font-size: 16px;
            color: #888;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .btn-back {
            background: #95a5a6;
            padding: 12px 20px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .word-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .word-thai {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .word-hebrew {
            font-size: 22px;
            color: #333;
            margin-bottom: 5px;
        }

        .word-pronunciation {
            font-size: 18px;
            color: #888;
            font-style: italic;
        }

        .flashcard-container {
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .flashcard {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .flashcard-back {
            transform: translate(-50%, -50%) rotateY(180deg);
        }

        .flashcard-thai {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }

        .flashcard-hebrew {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .flashcard-pronunciation {
            font-size: 24px;
            color: #888;
            font-style: italic;
        }

        .flashcard-hint {
            font-size: 16px;
            color: #999;
            margin-top: 20px;
        }

        .flashcard-counter {
            text-align: center;
            font-size: 20px;
            color: white;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .quiz-question {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .quiz-question-text {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .quiz-word {
            font-size: 40px;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }

        .quiz-options {
            display: grid;
            gap: 12px;
        }

        .quiz-option {
            background: #f8f9fa;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 20px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .quiz-option:hover {
            background: #e9ecef;
            transform: translateX(-3px);
        }

        .quiz-option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .quiz-option.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .quiz-option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .quiz-progress {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #667eea;
        }

        .quiz-help-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(255, 193, 7, 0.3);
        }

        .quiz-help-hint {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
            color: #856404;
            font-weight: 600;
        }

        .quiz-result {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .result-score {
            font-size: 72px;
            font-weight: 700;
            color: #667eea;
            margin: 20px 0;
        }

        .result-message {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
        }

        .stats-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            font-size: 20px;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #333;
        }

        .stat-value {
            font-weight: 700;
            color: #667eea;
            font-size: 24px;
        }

        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 22px;
            color: #666;
            line-height: 1.5;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-buttons .btn {
            margin-bottom: 0;
        }

        .mistakes-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .mistake-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .mistake-item:last-child {
            border-bottom: none;
        }

        .mistake-question {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .mistake-your-answer {
            font-size: 18px;
            color: #dc3545;
            margin-bottom: 5px;
        }

        .mistake-correct-answer {
            font-size: 18px;
            color: #28a745;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇹🇭 לימוד תאילנדית</h1>
            <div class="subtitle">אפליקציה ללימוד שפה תאילנדית</div>
        </div>

        <!-- Main Menu Screen -->
        <div id="mainMenu" class="screen active">
            <button class="btn" onclick="showScreen('learnMenu')">📚 מצב למידה</button>
            <button class="btn" onclick="showScreen('quizCategorySelect')">🎯 מצב מבחן</button>
            <button class="btn" onclick="showScreen('stats')">📊 סטטיסטיקות</button>
        </div>

        <!-- Learn Menu Screen -->
        <div id="learnMenu" class="screen">
            <button class="btn btn-back" onclick="showScreen('mainMenu')">← חזרה</button>
            <div id="learnCategoriesList"></div>
        </div>

        <!-- Learn Mode Select Screen -->
        <div id="learnModeSelect" class="screen">
            <button class="btn btn-back" onclick="showScreen('learnMenu')">← חזרה</button>
            <h2 style="color: white; text-align: center; margin-bottom: 20px; font-size: 28px;">בחר אופן תצוגה</h2>
            <button class="btn" onclick="startLearnList()">📜 רשימת גלילה</button>
            <button class="btn" onclick="startLearnFlashcards()">🎴 קלפים להחלקה</button>
        </div>

        <!-- Learn List Screen -->
        <div id="learnList" class="screen">
            <button class="btn btn-back" onclick="showScreen('learnModeSelect')">← חזרה</button>
            <div id="wordsList"></div>
        </div>

        <!-- Learn Flashcards Screen -->
        <div id="learnFlashcards" class="screen">
            <button class="btn btn-back" onclick="showScreen('learnModeSelect')">← חזרה</button>
            <div class="flashcard-counter" id="flashcardCounter"></div>
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="flashcard-front">
                        <div class="flashcard-thai" id="cardThai"></div>
                        <div class="flashcard-hint">לחץ להיפוך</div>
                    </div>
                    <div class="flashcard-back">
                        <div class="flashcard-hebrew" id="cardHebrew"></div>
                        <div class="flashcard-pronunciation" id="cardPronunciation"></div>
                    </div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="previousCard()">→ הקודם</button>
                <button class="btn btn-secondary" onclick="nextCard()">הבא ←</button>
            </div>
        </div>

        <!-- Quiz Category Select Screen -->
        <div id="quizCategorySelect" class="screen">
            <button class="btn btn-back" onclick="showScreen('mainMenu')">← חזרה</button>
            <h2 style="color: white; text-align: center; margin-bottom: 20px; font-size: 28px;">בחר קטגוריה</h2>
            <button class="btn" onclick="startQuiz('all')">🎲 מבחן רנדומלי כללי</button>
            <button class="btn" onclick="startQuiz('mistakes')">⚠️ נקודות חולשה</button>
            <div id="quizCategoriesList"></div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="screen">
            <div class="quiz-progress" id="quizProgress"></div>
            <button class="quiz-help-btn" id="helpBtn" onclick="showHint()">💡 עזרה - הגייה</button>
            <div class="quiz-help-hint" id="hintBox" style="display: none;"></div>
            <div class="quiz-question">
                <div class="quiz-question-text" id="questionText"></div>
                <div class="quiz-word" id="questionWord"></div>
            </div>
            <div class="quiz-options" id="quizOptions"></div>
            <button class="btn" id="nextQuestionBtn" onclick="nextQuestion()" style="display: none;">שאלה הבאה →</button>
        </div>

        <!-- Quiz Result Screen -->
        <div id="quizResult" class="screen">
            <div class="quiz-result">
                <div style="font-size: 60px;">🎉</div>
                <div class="result-score" id="resultScore"></div>
                <div class="result-message" id="resultMessage"></div>
                <button class="btn" onclick="retakeQuiz()">🔄 מבחן חוזר</button>
                <button class="btn" onclick="showMistakes()">📝 הצגת תשובות נכונות</button>
                <button class="btn btn-secondary" onclick="showScreen('mainMenu')">← חזרה לתפריט</button>
            </div>
        </div>

        <!-- Mistakes Review Screen -->
        <div id="mistakesReview" class="screen">
            <button class="btn btn-back" onclick="showScreen('quizResult')">← חזרה</button>
            <h2 style="color: white; text-align: center; margin-bottom: 20px; font-size: 28px;">תשובות נכונות</h2>
            <div class="mistakes-list" id="mistakesList"></div>
        </div>

        <!-- Stats Screen -->
        <div id="stats" class="screen">
            <button class="btn btn-back" onclick="showScreen('mainMenu')">← חזרה</button>
            <h2 style="color: white; text-align: center; margin-bottom: 20px; font-size: 28px;">סטטיסטיקות</h2>
            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-label">סה״כ מילים במאגר</span>
                    <span class="stat-value" id="totalWords">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">מילים שנלמדו</span>
                    <span class="stat-value" id="learnedWords">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">מבחנים שהושלמו</span>
                    <span class="stat-value" id="quizzesTaken">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">ציון ממוצע</span>
                    <span class="stat-value" id="avgScore">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">מילים לחזרה</span>
                    <span class="stat-value" id="mistakesCount">0</span>
                </div>
            </div>
        </div>
    </div>

        // State management
        let currentScreen = 'mainMenu';
        let selectedCategory = null;
        let currentCardIndex = 0;
        let currentWords = [];
        let quizState = {
            questions: [],
            currentQuestion: 0,
            score: 0,
            answers: [],
            categoryId: null,
            usedHint: false
        };

        // Local storage keys
        const STORAGE_KEYS = {
            learnedWords: 'thaiapp_learned',
            mistakes: 'thaiapp_mistakes',
            stats: 'thaiapp_stats'
        };

        // Initialize app
        function init() {
            loadStats();
            renderLearnCategories();
            renderQuizCategories();
        }

        // Screen management
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            currentScreen = screenId;
            
            if (screenId === 'stats') {
                updateStatsDisplay();
            }
        }

        // Learn Categories
        function renderLearnCategories() {
            const container = document.getElementById('learnCategoriesList');
            container.innerHTML = '';
            
            for (const [catId, catData] of Object.entries(vocabData.categories)) {
                if (catData.words.length === 0) continue;
                
                const card = document.createElement('div');
                card.className = 'card category-card';
                card.onclick = () => selectLearnCategory(catId);
                card.innerHTML = `
                    <div class="category-icon">${catData.icon}</div>
                    <div class="category-info">
                        <div class="category-name">${catData.name}</div>
                        <div class="category-count">${catData.words.length} מילים</div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function selectLearnCategory(catId) {
            selectedCategory = catId;
            currentWords = vocabData.categories[catId].words;
            showScreen('learnModeSelect');
        }

        // Learn List Mode
        function startLearnList() {
            const container = document.getElementById('wordsList');
            container.innerHTML = '';
            
            currentWords.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `
                    <div class="word-thai">${word.thai}</div>
                    <div class="word-hebrew">${word.hebrew}</div>
                    ${word.pronunciation ? `<div class="word-pronunciation">${word.pronunciation}</div>` : ''}
                `;
                container.appendChild(item);
            });
            
            markWordsAsLearned(currentWords);
            showScreen('learnList');
        }

        // Learn Flashcards Mode
        function startLearnFlashcards() {
            currentCardIndex = 0;
            showCard();
            markWordsAsLearned(currentWords);
            showScreen('learnFlashcards');
        }

        function showCard() {
            if (currentWords.length === 0) return;
            
            const word = currentWords[currentCardIndex];
            document.getElementById('cardThai').textContent = word.thai;
            document.getElementById('cardHebrew').textContent = word.hebrew;
            document.getElementById('cardPronunciation').textContent = word.pronunciation || '';
            document.getElementById('flashcardCounter').textContent = `${currentCardIndex + 1} / ${currentWords.length}`;
            
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped');
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            currentCardIndex = (currentCardIndex + 1) % currentWords.length;
            showCard();
        }

        function previousCard() {
            currentCardIndex = (currentCardIndex - 1 + currentWords.length) % currentWords.length;
            showCard();
        }

        // Quiz Categories
        function renderQuizCategories() {
            const container = document.getElementById('quizCategoriesList');
            container.innerHTML = '';
            
            for (const [catId, catData] of Object.entries(vocabData.categories)) {
                if (catData.words.length === 0) continue;
                
                const card = document.createElement('div');
                card.className = 'card category-card';
                card.onclick = () => startQuiz(catId);
                card.innerHTML = `
                    <div class="category-icon">${catData.icon}</div>
                    <div class="category-info">
                        <div class="category-name">${catData.name}</div>
                        <div class="category-count">${catData.words.length} מילים</div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        // Start Quiz
        function startQuiz(source) {
            let availableWords = [];
            
            if (source === 'all') {
                // Random from all categories
                for (const catData of Object.values(vocabData.categories)) {
                    availableWords.push(...catData.words);
                }
            } else if (source === 'mistakes') {
                // Words from mistakes
                const mistakes = getMistakes();
                if (mistakes.length === 0) {
                    alert('אין מילים לחזרה! נסה תחילה לפתור מבחן.');
                    return;
                }
                availableWords = mistakes.map(m => ({
                    thai: m.correctWord.thai,
                    hebrew: m.correctWord.hebrew,
                    pronunciation: m.correctWord.pronunciation
                }));
            } else {
                // Specific category
                availableWords = vocabData.categories[source].words;
            }
            
            if (availableWords.length === 0) {
                alert('אין מילים זמינות בקטגוריה זו!');
                return;
            }
            
            // Generate 20 questions (repeat if needed)
            const questions = [];
            for (let i = 0; i < 20; i++) {
                const word = availableWords[i % availableWords.length];
                const direction = Math.random() > 0.5 ? 'thai-to-hebrew' : 'hebrew-to-thai';
                
                questions.push({
                    word: word,
                    direction: direction,
                    correctAnswer: direction === 'thai-to-hebrew' ? word.hebrew : word.thai,
                    options: generateOptions(word, direction, availableWords)
                });
            }
            
            // Shuffle questions
            questions.sort(() => Math.random() - 0.5);
            
            quizState = {
                questions: questions,
                currentQuestion: 0,
                score: 0,
                answers: [],
                categoryId: source,
                usedHint: false
            };
            
            showQuestion();
            showScreen('quiz');
        }

        function generateOptions(correctWord, direction, allWords) {
            const correct = direction === 'thai-to-hebrew' ? correctWord.hebrew : correctWord.thai;
            const options = [correct];
            
            // Add 3 random wrong answers
            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            for (const word of shuffled) {
                const option = direction === 'thai-to-hebrew' ? word.hebrew : word.thai;
                if (option !== correct && !options.includes(option)) {
                    options.push(option);
                }
                if (options.length === 4) break;
            }
            
            // If not enough options, add some made up ones
            while (options.length < 4) {
                options.push('אפשרות ' + options.length);
            }
            
            return options.sort(() => Math.random() - 0.5);
        }

        function showQuestion() {
            const q = quizState.questions[quizState.currentQuestion];
            
            document.getElementById('quizProgress').textContent = `שאלה ${quizState.currentQuestion + 1} מתוך 20`;
            
            if (q.direction === 'thai-to-hebrew') {
                document.getElementById('questionText').textContent = 'מה המשמעות של המילה:';
                document.getElementById('questionWord').textContent = q.word.thai;
            } else {
                document.getElementById('questionText').textContent = 'איך אומרים בתאילנדית:';
                document.getElementById('questionWord').textContent = q.word.hebrew;
            }
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(option => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(option);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('nextQuestionBtn').style.display = 'none';
            document.getElementById('helpBtn').style.display = 'block';
            document.getElementById('hintBox').style.display = 'none';
            quizState.usedHint = false;
        }

        function showHint() {
            const q = quizState.questions[quizState.currentQuestion];
            const hintBox = document.getElementById('hintBox');
            
            if (q.word.pronunciation) {
                hintBox.textContent = `הגייה: ${q.word.pronunciation}`;
                hintBox.style.display = 'block';
                quizState.usedHint = true;
            } else {
                hintBox.textContent = 'אין הגייה זמינה למילה זו';
                hintBox.style.display = 'block';
            }
        }

        function selectAnswer(selected) {
            const q = quizState.questions[quizState.currentQuestion];
            const isCorrect = selected === q.correctAnswer;
            
            // Mark the selected answer
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => {
                if (opt.textContent === selected) {
                    opt.classList.add(isCorrect ? 'correct' : 'wrong');
                }
                if (opt.textContent === q.correctAnswer && !isCorrect) {
                    opt.classList.add('correct');
                }
                opt.onclick = null; // Disable clicking
            });
            
            if (isCorrect) {
                quizState.score++;
            } else {
                // Save mistake
                saveMistake({
                    question: q.direction === 'thai-to-hebrew' ? q.word.thai : q.word.hebrew,
                    userAnswer: selected,
                    correctAnswer: q.correctAnswer,
                    correctWord: q.word
                });
            }
            
            quizState.answers.push({
                question: q,
                selected: selected,
                correct: isCorrect
            });
            
            document.getElementById('nextQuestionBtn').style.display = 'block';
            document.getElementById('helpBtn').style.display = 'none';
        }

        function nextQuestion() {
            quizState.currentQuestion++;
            
            if (quizState.currentQuestion >= quizState.questions.length) {
                showQuizResult();
            } else {
                showQuestion();
            }
        }

        function showQuizResult() {
            const percentage = Math.round((quizState.score / 20) * 100);
            
            document.getElementById('resultScore').textContent = `${quizState.score}/20`;
            
            let message = '';
            if (percentage >= 90) message = 'מצוין! 🌟';
            else if (percentage >= 70) message = 'טוב מאוד! 👏';
            else if (percentage >= 50) message = 'לא רע! 👍';
            else message = 'כדאי לתרגל עוד 💪';
            
            document.getElementById('resultMessage').textContent = message;
            
            // Update stats
            updateStats(quizState.score, 20);
            
            showScreen('quizResult');
        }

        function retakeQuiz() {
            startQuiz(quizState.categoryId);
        }

        function showMistakes() {
            const container = document.getElementById('mistakesList');
            container.innerHTML = '';
            
            const wrongAnswers = quizState.answers.filter(a => !a.correct);
            
            if (wrongAnswers.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-text">מושלם! לא היו טעויות!</div></div>';
            } else {
                wrongAnswers.forEach(answer => {
                    const item = document.createElement('div');
                    item.className = 'mistake-item';
                    item.innerHTML = `
                        <div class="mistake-question">שאלה: ${answer.question.direction === 'thai-to-hebrew' ? answer.question.word.thai : answer.question.word.hebrew}</div>
                        <div class="mistake-your-answer">התשובה שלך: ${answer.selected}</div>
                        <div class="mistake-correct-answer">תשובה נכונה: ${answer.question.correctAnswer}</div>
                    `;
                    container.appendChild(item);
                });
            }
            
            showScreen('mistakesReview');
        }

        // Local Storage Functions
        function markWordsAsLearned(words) {
            const learned = getLearnedWords();
            words.forEach(w => {
                if (!learned.includes(w.thai)) {
                    learned.push(w.thai);
                }
            });
            localStorage.setItem(STORAGE_KEYS.learnedWords, JSON.stringify(learned));
        }

        function getLearnedWords() {
            const data = localStorage.getItem(STORAGE_KEYS.learnedWords);
            return data ? JSON.parse(data) : [];
        }

        function saveMistake(mistake) {
            const mistakes = getMistakes();
            mistakes.push(mistake);
            localStorage.setItem(STORAGE_KEYS.mistakes, JSON.stringify(mistakes));
        }

        function getMistakes() {
            const data = localStorage.getItem(STORAGE_KEYS.mistakes);
            return data ? JSON.parse(data) : [];
        }

        function updateStats(score, total) {
            const stats = getStats();
            stats.quizzesTaken++;
            stats.totalScore += score;
            stats.totalQuestions += total;
            localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(stats));
        }

        function getStats() {
            const data = localStorage.getItem(STORAGE_KEYS.stats);
            return data ? JSON.parse(data) : {
                quizzesTaken: 0,
                totalScore: 0,
                totalQuestions: 0
            };
        }

        function loadStats() {
            // Ensure stats exist
            if (!localStorage.getItem(STORAGE_KEYS.stats)) {
                localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify({
                    quizzesTaken: 0,
                    totalScore: 0,
                    totalQuestions: 0
                }));
            }
        }

        function updateStatsDisplay() {
            const learned = getLearnedWords();
            const mistakes = getMistakes();
            const stats = getStats();
            
            document.getElementById('totalWords').textContent = vocabData.total_words;
            document.getElementById('learnedWords').textContent = learned.length;
            document.getElementById('quizzesTaken').textContent = stats.quizzesTaken;
            
            const avgScore = stats.totalQuestions > 0 
                ? Math.round((stats.totalScore / stats.totalQuestions) * 100) 
                : 0;
            document.getElementById('avgScore').textContent = avgScore + '%';
            document.getElementById('mistakesCount').textContent = mistakes.length;
        }

        // Initialize app on load
        window.onload = init;
    </script>
</body>
</html>
