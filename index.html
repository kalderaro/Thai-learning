<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>לימוד תאילנדית - ליאור</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;color:#333;}.container{max-width:500px;margin:0 auto;}.header{background:white;border-radius:20px;padding:25px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2);margin-bottom:20px;}.screen{display:none;animation:fadeIn 0.3s;}.screen.active{display:block;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;cursor:pointer;display:flex;align-items:center;gap:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}.btn{background:white;color:#667eea;border:none;padding:18px;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}.btn-home{background:#34495e;color:white;}.quiz-option{background:#f8f9fa;border:3px solid transparent;border-radius:12px;padding:18px;font-size:20px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:10px;}.correct{border-color:#28a745;background:#d4edda;}.wrong{border-color:#dc3545;background:#f8d7da;}.flashcard{background:white;border-radius:20px;padding:60px 20px;min-height:300px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.15);margin-bottom:20px;}.word-thai{font-size:42px;color:#667eea;font-weight:bold;}.word-hebrew{font-size:32px;margin-top:15px;}.word-pron{font-size:22px;color:#888;margin-top:10px;font-style:italic;}.stats-box{background:white;border-radius:15px;padding:20px;margin-bottom:15px;}.stat-line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;}</style></head><body><div class="container"><div class="header"><h1>🇹🇭 לימוד תאילנדית</h1><p>שלום ליאור, הגרסה המלאה ביותר מוכנה</p></div><div id="mainMenu" class="screen active"><button class="btn" onclick="showScreen('learnMenu')">📚 מצב למידה</button><button class="btn" onclick="showScreen('quizMenu')">🎯 מצב מבחן</button><button class="btn" onclick="showScreen('statsScreen')">📊 סטטיסטיקות</button></div><div id="learnMenu" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור למסך הבית</button><div id="learnCats"></div></div><div id="learnModeSelect" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור הביתה</button><button class="btn" onclick="startLearnCards()">🎴 כרטיסיות (קלפים)</button><button class="btn" onclick="startLearnList()">📜 רשימה מלאה</button></div><div id="flashcardsScreen" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור הביתה</button><div id="flashcard" class="flashcard" onclick="toggleCard()"><div id="cardFront"><div class="word-thai" id="cardThai"></div><p style="color:#ccc;margin-top:20px;">לחץ להיפוך</p></div><div id="cardBack" style="display:none;"><div class="word-hebrew" id="cardHebrew"></div><div class="word-pron" id="cardPron"></div></div></div><div style="display:flex;gap:10px;"><button class="btn" onclick="prevCard()">הקודם</button><button class="btn" onclick="nextCard()">הבא</button></div></div><div id="listScreen" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור הביתה</button><div id="wordsDisplay"></div></div><div id="quizMenu" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור הביתה</button><button class="btn" style="background:#ffc107;" onclick="startQuiz('all')">🎲 מבחן רנדומלי מאוזן</button><button class="btn" style="background:#e74c3c;color:white;" onclick="startQuiz('mistakes')">⚠️ תרגול טעויות</button><div id="quizCats"></div></div><div id="quiz" class="screen"><div id="quizProgress" style="text-align:center;color:white;margin-bottom:10px;"></div><div class="header"><h2 id="qText"></h2><h1 id="qWord" style="color:#667eea"></h1></div><div id="quizOpts"></div><button id="nextBtn" class="btn" style="display:none" onclick="nextQ()">המשך ←</button></div><div id="statsScreen" class="screen"><button class="btn btn-home" onclick="showScreen('mainMenu')">🏠 חזור הביתה</button><div class="stats-box" id="statsContent"></div><button class="btn" style="background:#e74c3c;color:white;" onclick="resetStats()">🗑️ אפס נתונים</button></div></div><script>const vocab={"categories":{"basics":{"name":"בסיסי","icon":"💬","words":[{"thai":"Sawatdee","hebrew":"שלום","pron":"סַוַּאט-דִי"},{"thai":"Khop khun","hebrew":"תודה","pron":"קוֹפּ קוּן"},{"thai":"Kho thot","hebrew":"סליחה","pron":"קוֹ תוֹט"},{"thai":"Mai pen rai","hebrew":"זה בסדר","pron":"מַאי פֶּן רַאי"},{"thai":"Phom","hebrew":"אני (גבר)","pron":"פוֹם"},{"thai":"Chai","hebrew":"כן","pron":"צ'אי"},{"thai":"Mai","hebrew":"לא","pron":"מאי"},{"thai":"Yak","hebrew":"רוצה","pron":"יַאק"}]},"food":{"name":"אוכל וירקות","icon":"🥦","words":[{"thai":"Khao-pode","hebrew":"תירס","pron":"קָאוּ-פּוֹדֶה"},{"thai":"Phak-kaat","hebrew":"חסה","pron":"פָאק-קָאט"},{"thai":"Taeng-kwa","hebrew":"מלפפון","pron":"תֶּנְג-כּוּאַה"},{"thai":"Meed","hebrew":"סכין","pron":"מִיד"},{"thai":"Jan","hebrew":"צלחת","pron":"גָ'אן"},{"thai":"Som","hebrew":"מזלג","pron":"סוֹם"},{"thai":"Gin","hebrew":"לאכול","pron":"גִין"},{"thai":"Phet","hebrew":"חריף","pron":"פֶט"},{"thai":"Aroi maak","hebrew":"טעים מאוד","pron":"אַרוֹי מָאק"}]},"fruits":{"name":"פירות","icon":"🍊","words":[{"thai":"Ma-muang","hebrew":"מנגו","pron":"מָה-מוּאַנְג"},{"thai":"Sap-pa-rot","hebrew":"אננס","pron":"סַפּ-פַּה-רוֹט"},{"thai":"Ma-prao","hebrew":"קוקוס","pron":"מָה-פְּרָאוּ"},{"thai":"Kluay","hebrew":"בננה","pron":"קוּאַי"},{"thai":"Taeng-mo","hebrew":"אבטיח","pron":"תֶנְג-מוֹ"}]},"trans":{"name":"תחבורה","icon":"🚕","words":[{"thai":"Jort thee-nee","hebrew":"עצור כאן","pron":"יוּט תִי-נִי"},{"thai":"Liao kwa","hebrew":"פנה ימינה","pron":"לִיאוּ כּוּאַה"},{"thai":"Liao sai","hebrew":"פנה שמאלה","pron":"לִיאוּ סַאי"},{"thai":"Trong pai","hebrew":"סע ישר","pron":"טְרוֹנְג פַּאי"}]},"numbers":{"name":"מספרים","icon":"🔢","words":[{"thai":"Sun","hebrew":"0","pron":"סוּן"},{"thai":"Neung","hebrew":"1","pron":"נוּנְג"},{"thai":"Song","hebrew":"2","pron":"סוֹנְג"},{"thai":"Sam","hebrew":"3","pron":"סָאם"},{"thai":"See","hebrew":"4","pron":"סִי"},{"thai":"Ha","hebrew":"5","pron":"הָא"}]}}};let state={currentCat:null,wordIndex:0,score:0,questions:[],mistakes:JSON.parse(localStorage.getItem('thaiMistakes')||'[]'),stats:JSON.parse(localStorage.getItem('thaiStats')||'{"total":0,"correct":0}')};function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='statsScreen')renderStats();}function init(){const l=document.getElementById('learnCats'),q=document.getElementById('quizCats');l.innerHTML='';q.innerHTML='';for(let id in vocab.categories){let c=vocab.categories[id];let html=`<div class="card" onclick="selectCat('${id}','{{M}}')"><span>${c.icon}</span><strong>${c.name}</strong></div>`;l.innerHTML+=html.replace('{{M}}','learn');q.innerHTML+=html.replace('{{M}}','quiz');}}function selectCat(id,m){state.currentCat=id;if(m==='learn')showScreen('learnModeSelect');else startQuiz(id);}function startLearnCards(){state.wordIndex=0;showCard();showScreen('flashcardsScreen');}function showCard(){const w=vocab.categories[state.currentCat].words[state.wordIndex];document.getElementById('cardThai').textContent=w.thai;document.getElementById('cardHebrew').textContent=w.hebrew;document.getElementById('cardPron').textContent=`(${w.pron})`;document.getElementById('cardBack').style.display='none';document.getElementById('cardFront').style.display='block';}function toggleCard(){const f=document.getElementById('cardFront'),b=document.getElementById('cardBack');if(f.style.display==='none'){f.style.display='block';b.style.display='none';}else{f.style.display='none';b.style.display='block';}}function nextCard(){state.wordIndex=(state.wordIndex+1)%vocab.categories[state.currentCat].words.length;showCard();}function prevCard(){state.wordIndex=(state.wordIndex-1+vocab.categories[state.currentCat].words.length)%vocab.categories[state.currentCat].words.length;showCard();}function startLearnList(){const d=document.getElementById('wordsDisplay');d.innerHTML='';vocab.categories[state.currentCat].words.forEach(w=>d.innerHTML+=`<div class="card"><strong>${w.thai}</strong> - ${w.hebrew} <small>(${w.pron})</small></div>`);showScreen('listScreen');}function startQuiz(src){let pool=[];if(src==='all'){Object.values(vocab.categories).forEach(c=>pool.push(...c.words.sort(()=>0.5-Math.random()).slice(0,4)));}else if(src==='mistakes'){pool=state.mistakes.length>0?state.mistakes:Object.values(vocab.categories).map(c=>c.words[0]);}else{pool=vocab.categories[src].words;}state.questions=pool.sort(()=>0.5-Math.random()).slice(0,10).map(w=>({w,correct:w.hebrew,opts:[w.hebrew,"תודה","בית","סירה","מלפפון","מים","1"].sort(()=>0.5-Math.random()).slice(0,4)}));state.current=0;state.score=0;showQ();showScreen('quiz');}function showQ(){const q=state.questions[state.current];document.getElementById('quizProgress').textContent=`שאלה ${state.current+1} מתוך ${state.questions.length}`;document.getElementById('qWord').textContent=q.w.thai;document.getElementById('qText').textContent="מה הפירוש?";const o=document.getElementById('quizOpts');o.innerHTML='';q.opts.forEach(opt=>{const d=document.createElement('div');d.className='quiz-option';d.textContent=opt;d.onclick=()=>{if(opt===q.correct){d.classList.add('correct');state.score++;state.stats.correct++;}else{d.classList.add('wrong');if(!state.mistakes.find(m=>m.thai===q.w.thai))state.mistakes.push(q.w);}state.stats.total++;localStorage.setItem('thaiMistakes',JSON.stringify(state.mistakes));localStorage.setItem('thaiStats',JSON.stringify(state.stats));Array.from(o.children).forEach(el=>el.onclick=null);document.getElementById('nextBtn').style.display='block';};o.appendChild(d);});document.getElementById('nextBtn').style.display='none';}function nextQ(){state.current++;if(state.current<state.questions.length)showQ();else{alert(`סיימת! ציון: ${state.score}/${state.questions.length}`);showScreen('mainMenu');}}function renderStats(){const s=state.stats;const p=s.total>0?Math.round((s.correct/s.total)*100):0;document.getElementById('statsContent').innerHTML=`<div class="stat-line"><span>שאלות שענית:</span><strong>${s.total}</strong></div><div class="stat-line"><span>תשובות נכונות:</span><strong>${s.correct}</strong></div><div class="stat-line"><span>אחוז הצלחה:</span><strong>${p}%</strong></div><div class="stat-line"><span>מילים לחיזוק:</span><strong>${state.mistakes.length}</strong></div>`;}function resetStats(){if(confirm('לאפס הכל?')){localStorage.clear();location.reload();}}init();</script></body></html>
